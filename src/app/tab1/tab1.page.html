<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Filmes
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list *ngIf="listaFilmes">

    <ion-item-sliding *ngFor="let Filme of listaFilmes">
      <ion-item lines="full" (click)="exibirFilme(Filme)">
        <ion-thumbnail slot="start">
          <img *ngIf="Filme.cartaz" src="{{Filme.cartaz}}" />
          <ion-icon *ngIf="!Filme.cartaz" name="videocam-off"></ion-icon>
        </ion-thumbnail>
          <ion-label class="ion-text-wrap">
            <div>
              <h1>{{Filme.nome}}</h1>
              <p>{{Filme.lancamento}}</p>
              <ion-badge color="medium" *ngFor="let genero of Filme.generos">
                {{genero}}
              </ion-badge>
              <ion-icon name="star" [color]="Filme.favorito===true ?  'warning': ('light')"></ion-icon>
            </div>
          </ion-label>
          <ion-chip [color]="Filme.classificacao < 5 ? 'danger': ((Filme.classificacao < 7 ? 'warning' : 'success'))" outline>
            <ion-label>{{Filme.classificacao}}</ion-label>
          </ion-chip>
        </ion-item>
        <ion-item-options side="start">
          <ion-item-option color="primary" (click)="exibirAlertaFavorito(Filme)">
            <ion-icon slot="icon-only" name="star"></ion-icon>
          </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>
</ion-content>
